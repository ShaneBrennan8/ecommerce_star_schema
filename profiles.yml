ecommerce_profile:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: evocative-depot-427007-m8
      dataset: online_ecommerce_star_schema
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive
      client_email: "{{ env_var('DBT_ENV_SECRET_CLIENT_EMAIL') }}"
      private_key: "{{ env_var('DBT_ENV_SECRET_PRIVATE_KEY') | replace('\\n', '\n') }}"
      private_key_id: "{{ env_var('DBT_ENV_SECRET_PRIVATE_KEY_ID') }}"
      project_id: evocative-depot-427007-m8