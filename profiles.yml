ecommerce_profile:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: evocative-depot-427007-m8
      dataset: online_ecommerce_star_schema
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive
      client_email: "{{ env_var('DBT_ENV_SECRET_CLIENT_EMAIL') }}"
      # Point directly to the file created by the runner
      keyfile_json:
        type: "service_account"
        project_id: "evocative-depot-427007-m8"
        client_email: "{{ env_var('DBT_ENV_SECRET_CLIENT_EMAIL') }}"
        private_key_path: "./bq_private_key.pem"