name: dbt_ci_cd

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

env:
  DBT_PROJECT_DIR: ./
  DBT_PROFILES_DIR: ./

jobs:
  dbt_ci_cd:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9.x'

    - name: Install dbt
      run: |
        python -m pip install --upgrade pip
        pip install dbt-core==1.7.18 dbt-bigquery==1.7.9

    - name: Run dbt pipeline
      env:
        # Passes the secret string smoothly to the dbt env_var engine
        DBT_GCP_JSON_KEY_FILE: ${{ secrets.DBT_GCP_JSON_KEY_FILE }}
      run: |
        dbt debug
        dbt deps
        dbt seed
        dbt run

    - name: Test dbt models
      env:
        DBT_GCP_JSON_KEY_FILE: ${{ secrets.DBT_GCP_JSON_KEY_FILE }}
      run: |
        dbt test