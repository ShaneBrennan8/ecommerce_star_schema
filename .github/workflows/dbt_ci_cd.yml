name: dbt Core CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run_dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install dbt-bigquery

      - name: Install dbt packages
        run: |
          dbt deps

      - name: Run dbt pipeline
        env:
          DBT_ENV_SECRET_PROJECT_ID: ${{ secrets.DBT_ENV_SECRET_PROJECT_ID }}
          DBT_ENV_SECRET_CLIENT_EMAIL: ${{ secrets.DBT_ENV_SECRET_CLIENT_EMAIL }}
          DBT_ENV_SECRET_PRIVATE_KEY: ${{ secrets.DBT_ENV_SECRET_PRIVATE_KEY }}
        run: |
          # Safely dump the multiline key directly to a file on the runner
          echo "$DBT_ENV_SECRET_PRIVATE_KEY" > ./bq_private_key.pem
          
          echo "=== Running Debug ==="
          dbt debug --profiles-dir . --target dev
          
          echo "=== Running Models ==="
          dbt run --profiles-dir . --target dev
          
          echo "=== Running Tests ==="
          dbt test --profiles-dir . --target dev