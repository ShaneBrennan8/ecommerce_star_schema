name: dbt Core CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run_dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install dbt-bigquery

      - name: Install dbt packages
        run: |
          dbt deps

      - name: Parse and Export GCP Credentials
        run: |
          # Pulls fields dynamically from the raw JSON secret into the pipeline environment
          echo "DBT_ENV_SECRET_PRIVATE_KEY=$(echo '${{ secrets.DBT_ENV_SECRET_BQ_CREDENTIALS }}' | jq -r '.private_key')" >> $GITHUB_ENV
          echo "DBT_ENV_SECRET_CLIENT_EMAIL=$(echo '${{ secrets.DBT_ENV_SECRET_BQ_CREDENTIALS }}' | jq -r '.client_email')" >> $GITHUB_ENV

      - name: Run dbt Debug
        env:
          DBT_ENV_SECRET_BQ_CREDENTIALS: ${{ secrets.DBT_ENV_SECRET_BQ_CREDENTIALS }}
        run: dbt debug

      - name: Run dbt Models
        env:
          DBT_ENV_SECRET_BQ_CREDENTIALS: ${{ secrets.DBT_ENV_SECRET_BQ_CREDENTIALS }}
        run: dbt run --profiles-dir .

      - name: Test dbt Models
        env:
          DBT_ENV_SECRET_BQ_CREDENTIALS: ${{ secrets.DBT_ENV_SECRET_BQ_CREDENTIALS }}
        run: dbt test --profiles-dir .